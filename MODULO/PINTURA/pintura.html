<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pintura y Artículos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <link rel="stylesheet" href="pintura.css">

    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>

<div class="layout">

   <div id="menuGlobal"></div>

    <!-- CONTENIDO -->
    <main class="main-content" id="mainContent">

        <section class="topbar">
            <div><h1>Pintura y Artículos de Utilidad</h1><p>Control de pintura, materiales y facturación.</p></div>
            <button class="btn btn-azul" onclick="abrirModalArticulo()">➕ Nuevo Artículo</button>
        </section>

        <section class="cards">
            <div class="card"><span>Total Artículos</span><strong id="cardTotal">0</strong></div>
            <div class="card"><span>Monto Total</span><strong id="cardMonto">$0.00</strong></div>
        </section>

        <section class="table-panel">
            <table class="tabla-datos">
                <thead>
                    <tr><th>Descripción</th><th>Referencia</th><th>Cantidad</th><th>Precio Unit.</th><th>Total</th><th>Factura</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="modalArticulo" class="modal">
    <div class="modal-contenido">
        <div class="modal-header"><h2>Nuevo Artículo</h2><button class="btn-cerrar" onclick="cerrarModal()">✕</button></div>
        <form onsubmit="guardarArticulo(event)">
            <div class="form-grupo"><label>Descripción *</label><input type="text" id="descripcion" required></div>
            <div class="form-grupo"><label>Referencia</label><input type="text" id="referencia"></div>
            <div class="form-row">
                <div class="form-grupo"><label>Cantidad *</label><input type="number" id="cantidad" required min="1"></div>
                <div class="form-grupo"><label>Precio Unitario *</label><input type="number" id="precio" step="0.01" required min="0"></div>
            </div>
            <div class="form-grupo"><label>Factura</label><input type="text" id="factura" placeholder="Nro. de factura"></div>
            <div class="form-grupo"><label>Proveedor</label><input type="text" id="proveedor"></div>
            <div class="form-acciones"><button type="submit" class="btn btn-verde">💾 Guardar</button></div>
        </form>
    </div>
</div>
<script src="../MENUS.JS"></script>
<script src="pintura.js"></script>
</body>
</html>
