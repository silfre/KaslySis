<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unidades Alquiladas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button type="button" class="btn-menu" onclick="alternarMenu()" title="Abrir/Cerrar menú">☰</button>
      <div class="brand">
        <div class="brand-icon">K</div>
        <div class="brand-text">KashlySys</div>
      </div>
      <nav class="menu">
        <a href="../INICIO/index.html" class="menu-item">
          <span class="menu-emoji">🏠</span>
          <span class="menu-text">Inicio</span>
        </a>
        <a href="alquiler-nuevo.html" class="menu-item active">
          <span class="menu-emoji">🚗</span>
          <span class="menu-text">Alquiler</span>
        </a>
      </nav>
    </aside>

    <main class="main-content" id="mainContent">
      <section class="topbar card">
        <div>
          <h1>🚗 Unidades Alquiladas</h1>
          <p>Control de alquileres y rentas de unidades</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-primary" onclick="abrirModalAlquiler()" style="background: #2196F3; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">➕ Nuevo Alquiler</button>
        </div>
      </section>

      <section class="summary-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; background: white; margin: 20px; border-radius: 8px;">
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Alquileres Activos</span>
          <strong id="activos" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Ingresos Este Mes</span>
          <strong id="ingresos" style="display: block; font-size: 28px; margin-top: 10px;">$0.00</strong>
        </div>
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Total Alquileres</span>
          <strong id="total" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
      </section>

      <section class="card" style="background: white; padding: 20px; margin: 20px; border-radius: 8px;">
        <div class="section-header" style="margin-bottom: 15px;">
          <input type="text" id="buscarAlquiler" placeholder="Buscar unidad o cliente..." onkeyup="filtrarTabla()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        <table class="tabla-datos" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #f5f5f5;">
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Unidad</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Cliente</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Inicio</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Fin</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Días</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Tarifa/Día</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Total</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Estado</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaAlquiler">
            <tr><td colspan="9" style="text-align: center; padding: 20px;">Cargando...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="../BASE_DATOS/database.js"></script>
  <script src="../MENUS.JS"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      inicializarBD();
      renderizarUI();
    });

    function renderizarUI() {
      renderizarTabla();
    }

    function abrirModalAlquiler() {
      const modal = `
        <div id="modal" class="modal" style="display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
          <div class="modal-contenido" style="background: white; margin: 50px auto; padding: 30px; width: 90%; max-width: 600px; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
              <h2 style="margin: 0;">Nuevo Alquiler</h2>
              <button onclick="cerrarModal()" style="background: #f5f5f5; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 20px;">✕</button>
            </div>
            <form onsubmit="guardarAlquiler(event)">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Unidad *</label>
                  <input type="text" id="unidad" placeholder="Ej: T-001" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Cliente *</label>
                  <input type="text" id="cliente" placeholder="Nombre cliente" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Inicio *</label>
                  <input type="date" id="inicio" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Fin *</label>
                  <input type="date" id="fin" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Tarifa/Día *</label>
                  <input type="number" id="tarifa" step="0.01" placeholder="0.00" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Estado</label>
                  <select id="estado" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="Activo">Activo</option>
                    <option value="Finalizado">Finalizado</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; background: #2196F3; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">💾 Guardar Alquiler</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modal);
    }

    function cerrarModal() {
      const modal = document.getElementById('modal');
      if (modal) modal.remove();
    }

    function guardarAlquiler(event) {
      event.preventDefault();
      const unidad = document.getElementById('unidad').value.trim();
      const cliente = document.getElementById('cliente').value.trim();
      const inicio = document.getElementById('inicio').value.trim();
      const fin = document.getElementById('fin').value.trim();
      const tarifa = parseFloat(document.getElementById('tarifa').value) || 0;
      const estado = document.getElementById('estado').value.trim();

      if (!unidad || !cliente || !inicio || !fin || tarifa <= 0) {
        alert('❌ Completa todos los campos');
        return;
      }

      const fechaInicio = new Date(inicio);
      const fechaFin = new Date(fin);
      const dias = Math.ceil((fechaFin - fechaInicio) / (1000 * 60 * 60 * 24)) + 1;
      const total = dias * tarifa;

      const alquiler = {
        id: Date.now().toString(),
        unidad: unidad,
        cliente: cliente,
        inicio: inicio,
        fin: fin,
        dias: dias,
        tarifa: tarifa,
        total: total,
        estado: estado,
        fechaRegistro: new Date().toISOString().split('T')[0]
      };

      const alquileres = sistemaBD.alquiler || [];
      alquileres.push(alquiler);
      guardarBD();

      cerrarModal();
      renderizarUI();
      alert('✓ Alquiler registrado.');
    }

    function renderizarTabla() {
      const tbody = document.getElementById('tablaAlquiler');
      const alquileres = sistemaBD.alquiler || [];

      if (alquileres.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">No hay alquileres</td></tr>';
        actualizarResumen();
        return;
      }

      tbody.innerHTML = alquileres.map(a => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${a.unidad}</td>
          <td style="padding: 12px;">${a.cliente}</td>
          <td style="padding: 12px;">${a.inicio}</td>
          <td style="padding: 12px;">${a.fin}</td>
          <td style="padding: 12px;">${a.dias}</td>
          <td style="padding: 12px;">$${a.tarifa?.toFixed(2)}</td>
          <td style="padding: 12px;">$${a.total?.toFixed(2)}</td>
          <td style="padding: 12px;">
            <span style="background: ${a.estado === 'Activo' ? '#4CAF50' : '#f44336'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${a.estado}</span>
          </td>
          <td style="padding: 12px;">
            <button onclick="eliminarAlquiler('${a.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');

      actualizarResumen();
    }

    function filtrarTabla() {
      const termino = document.getElementById('buscarAlquiler').value.toLowerCase();
      const alquileres = sistemaBD.alquiler || [];
      const filtrados = alquileres.filter(a =>
        a.unidad?.toLowerCase().includes(termino) ||
        a.cliente?.toLowerCase().includes(termino)
      );

      const tbody = document.getElementById('tablaAlquiler');
      if (filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">No hay resultados</td></tr>';
        return;
      }

      tbody.innerHTML = filtrados.map(a => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${a.unidad}</td>
          <td style="padding: 12px;">${a.cliente}</td>
          <td style="padding: 12px;">${a.inicio}</td>
          <td style="padding: 12px;">${a.fin}</td>
          <td style="padding: 12px;">${a.dias}</td>
          <td style="padding: 12px;">$${a.tarifa?.toFixed(2)}</td>
          <td style="padding: 12px;">$${a.total?.toFixed(2)}</td>
          <td style="padding: 12px;">
            <span style="background: ${a.estado === 'Activo' ? '#4CAF50' : '#f44336'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${a.estado}</span>
          </td>
          <td style="padding: 12px;">
            <button onclick="eliminarAlquiler('${a.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    function eliminarAlquiler(id) {
      if (!confirm('¿Seguro?')) return;
      const alquileres = sistemaBD.alquiler || [];
      const index = alquileres.findIndex(a => a.id === id);
      if (index > -1) {
        alquileres.splice(index, 1);
        guardarBD();
      }
      renderizarUI();
    }

    function actualizarResumen() {
      const alquileres = sistemaBD.alquiler || [];
      const activos = alquileres.filter(a => a.estado === 'Activo').length;
      const ingresos = alquileres.reduce((sum, a) => sum + a.total, 0);
      const total = alquileres.length;

      document.getElementById('activos').textContent = activos;
      document.getElementById('ingresos').textContent = `$${ingresos.toFixed(2)}`;
      document.getElementById('total').textContent = total;
    }
  </script>
</body>
</html>
