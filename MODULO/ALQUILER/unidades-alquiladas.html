<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unidades Alquiladas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .main-content { flex: 1; margin-left: 250px; overflow-y: auto; padding: 20px; }
        .topbar { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .topbar h1 { margin: 0; font-size: 28px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; background: #2196F3; color: white; }
        .btn:hover { background: #1976D2; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; background: white; border-radius: 8px; margin-bottom: 20px; }
        .card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; }
        .card strong { display: block; font-size: 28px; margin-top: 10px; }
        .table-panel { background: white; padding: 20px; border-radius: 8px; }
        .tabla-datos { width: 100%; border-collapse: collapse; }
        .tabla-datos th { background: #f5f5f5; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        .tabla-datos td { padding: 12px; border-bottom: 1px solid #ddd; }
        .tabla-datos tr:hover { background: #f9f9f9; }
    </style>
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px;"><div style="font-size: 18px; font-weight: bold;">KashlySys</div></div>
        <nav style="padding: 10px;">
            <a href="../INICIO/index.html" style="display: flex; padding: 12px 15px; color: rgba(255,255,255,0.8); text-decoration: none;">🏠 Inicio</a>
            <a href="unidades-alquiladas.html" style="display: flex; padding: 12px 15px; background: rgba(255,255,255,0.2); color: white; text-decoration: none;">🚗 Alquiladas</a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <section class="topbar">
            <h1>Unidades Alquiladas</h1>
            <p>Control de vehículos en arrendamiento</p>
            <button class="btn" onclick="alert('✓ Función en desarrollo')">➕ Nueva Unidad Alquilada</button>
        </section>

        <section class="cards">
            <div class="card"><span>Total Alquiladas</span><strong>0</strong></div>
            <div class="card"><span>Activas</span><strong>0</strong></div>
            <div class="card"><span>Vencidas</span><strong>0</strong></div>
        </section>

        <section class="table-panel">
            <table class="tabla-datos">
                <thead>
                    <tr><th>Unidad</th><th>Empresa</th><th>Fecha Inicio</th><th>Fecha Fin</th><th>Monto Diario</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" style="text-align: center; color: #999;">Módulo en desarrollo</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>

</body>
</html>
