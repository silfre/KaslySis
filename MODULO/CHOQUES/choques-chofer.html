<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Choques por Chofer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <link rel="stylesheet" href="choques.css">
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body class="page-choques">
<div class="layout">

   <div id="menuGlobal"></div>

    <!-- CONTENIDO -->
    <main class="main-content" id="mainContent">
        <section class="topbar">
            <div><h1>Reportes de Choques - Por Chofer</h1><p>Histórico de incidentes por conductor.</p></div>
            
        </section>

         <section class="cards">
    <div class="card"><span>Total Choques</span><strong id="cardTotal">0</strong></div>
    <div class="card"><span>Choferes con Choques</span><strong id="cardChoferes">0</strong></div>
    <div class="card"><span>Promedio por Chofer</span><strong id="cardPromedio">0</strong></div>
    <div class="card"><span>Chofer con menos puntos</span><strong id="cardMenorPuntos">0</strong></div>
        </section>

        <section class="table-panel">
            <div class="panel-header">
                <input class="buscador" id="buscador" type="text" placeholder="Buscar chofer..." oninput="filtrarDatos()">
            </div>

           <div class="tabla-contenedor">
    <table class="tabla-datos tabla-choques">
        <thead>
            <tr>
                <th>Chofer</th>
                <th>Choques</th>
                <th>Últimos 12 Meses</th>
                <th>Severidad Mayor</th>
                <th>Puntos Restados</th>
                <th>Puntos que le quedan</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaBody"></tbody>
    </table>
</div>
        </section>
    </main>
</div>



<!-- MODAL HISTORIAL COMPLETO DEL CHOFER -->
<div id="modalDetalleChofer" class="modal-detalle-choque">
    <div class="modal-detalle-contenido">
        <div class="modal-header">
            <h2>Historial completo del chofer</h2>
            <button class="btn-cerrar" type="button" onclick="cerrarDetalleChofer()">✕</button>
        </div>

        <div id="contenidoDetalleChofer"></div>
    </div>
</div>

<!-- VISOR DE FOTO GRANDE -->
<div id="visorFotoGrandeChofer" class="visor-foto-grande">
    <button class="btn-cerrar-foto" type="button" onclick="cerrarFotoGrandeChofer()">✕</button>

    <button class="btn-flecha-foto izquierda" type="button" onclick="cambiarFotoGrandeChofer(-1)">❮</button>

    <div class="foto-grande-contenedor">
        <img id="imagenFotoGrandeChofer" src="" alt="Foto del choque">
        <p id="contadorFotosChofer"></p>
    </div>

    <button class="btn-flecha-foto derecha" type="button" onclick="cambiarFotoGrandeChofer(1)">❯</button>
</div>


<script src="../MENUS.JS"></script>
<script src="choques-chofer.js"></script>
</body>
</html>
