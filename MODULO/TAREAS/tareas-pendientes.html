<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tareas Pendientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <link rel="stylesheet" href="tareas.css">
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <button class="btn-menu" onclick="alternarMenu()">☰</button>
        <div class="logo"><div class="logo-icono">K</div><div class="logo-texto">KashlySys</div></div>
        <nav class="menu">
            <a href="../INICIO/index.html" class="menu-item"><span class="menu-icono">🏠</span><span class="menu-texto">Inicio</span></a>
            <a href="tareas-pendientes.html" class="menu-item activo"><span class="menu-icono">✓</span><span class="menu-texto">Tareas Pendientes</span></a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <section class="topbar">
            <div><h1>Tareas Pendientes</h1><p>Control de tareas individuales y generales, actualización mensual.</p></div>
            <div class="botones">
                <button class="btn btn-azul" onclick="abrirModalTarea()">➕ Nueva Tarea</button>
                <button class="btn btn-verde" onclick="descargarExcel()">📥 Descargar</button>
                <button class="btn btn-naranja" onclick="filtrarPor('estado')">🔍 Filtrar</button>
            </div>
        </section>

        <section class="cards">
            <div class="card"><span>Total Tareas</span><strong id="cardTotal">0</strong></div>
            <div class="card"><span>Pendientes</span><strong id="cardPendientes">0</strong></div>
            <div class="card"><span>En Progreso</span><strong id="cardProgreso">0</strong></div>
            <div class="card"><span>Completadas</span><strong id="cardCompletadas">0</strong></div>
        </section>

        <section class="table-panel">
            <div class="panel-header">
                <div><h2>Historial de Tareas</h2></div>
                <input class="buscador" id="buscador" type="text" placeholder="Buscar tarea..." oninput="filtrarDatos()">
            </div>

            <div class="filtros">
                <select id="filtroEstado" onchange="filtrarDatos()">
                    <option value="">-- Todos los estados --</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="en_progreso">En Progreso</option>
                    <option value="completada">Completada</option>
                </select>
                <select id="filtroTipo" onchange="filtrarDatos()">
                    <option value="">-- Todos los tipos --</option>
                    <option value="individual">Individual</option>
                    <option value="general">General</option>
                </select>
            </div>

            <table class="tabla-datos">
                <thead>
                    <tr><th>Título</th><th>Tipo</th><th>Asignado</th><th>Estado</th><th>Prioridad</th><th>Vencimiento</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="modalTarea" class="modal">
    <div class="modal-contenido">
        <div class="modal-header"><h2>Nueva Tarea</h2><button class="btn-cerrar" onclick="cerrarModal()">✕</button></div>
        <form onsubmit="guardarTarea(event)">
            <div class="form-grupo"><label>Título *</label><input type="text" id="titulo" required></div>
            <div class="form-grupo"><label>Descripción</label><textarea id="descripcion" rows="3"></textarea></div>
            <div class="form-row">
                <div class="form-grupo"><label>Tipo *</label><select id="tipo" required>
                    <option value="individual">Individual</option>
                    <option value="general">General</option>
                </select></div>
                <div class="form-grupo"><label>Prioridad</label><select id="prioridad">
                    <option value="baja">Baja</option>
                    <option value="normal" selected>Normal</option>
                    <option value="alta">Alta</option>
                </select></div>
            </div>
            <div class="form-grupo"><label>Asignado A</label><select id="asignado"></select></div>
            <div class="form-grupo"><label>Fecha de Vencimiento</label><input type="date" id="vencimiento"></div>
            <div class="form-grupo"><label>Próxima Actualización</label><select id="actualizacion">
                <option value="semanal">Semanal</option>
                <option value="mensual" selected>Mensual</option>
                <option value="trimestral">Trimestral</option>
            </select></div>
            <div class="form-acciones"><button type="submit" class="btn btn-verde">💾 Guardar</button></div>
        </form>
    </div>
</div>

<script src="tareas-pendientes.js"></script>
</body>
</html>
