<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
</head>
<body>
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <button type="button" class="btn-menu" onclick="alternarMenu()" title="Abrir/Cerrar menú">☰</button>
      <div class="brand">
        <div class="brand-icon">K</div>
        <div class="brand-text">KashlySys</div>
      </div>
      <nav class="menu">
        <a href="../INICIO/index.html" class="menu-item">
          <span class="menu-emoji">🏠</span>
          <span class="menu-text">Inicio</span>
        </a>
        <a href="inventario.html" class="menu-item active">
          <span class="menu-emoji">📦</span>
          <span class="menu-text">Inventario</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content" id="mainContent">
      <section class="topbar card">
        <div>
          <h1>📦 Inventario General</h1>
          <p>Control de stock de artículos y piezas</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-primary" onclick="abrirModalArticulo()" style="background: #2196F3; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">➕ Nuevo Artículo</button>
        </div>
      </section>

      <!-- RESUMEN -->
      <section class="summary-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; background: white; margin: 20px; border-radius: 8px;">
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Total Artículos</span>
          <strong id="totalArticulos" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Stock Bajo</span>
          <strong id="stockBajo" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Valor Total</span>
          <strong id="valorTotal" style="display: block; font-size: 28px; margin-top: 10px;">$0.00</strong>
        </div>
      </section>

      <!-- TABLA -->
      <section class="card" style="background: white; padding: 20px; margin: 20px; border-radius: 8px;">
        <div class="section-header" style="margin-bottom: 15px;">
          <input type="text" id="buscarArticulo" placeholder="Buscar artículo..." onkeyup="filtrarTabla()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        <table class="tabla-datos" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #f5f5f5;">
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Descripción</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Referencia</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Cantidad</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Mín Stock</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Estado</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Precio Unit.</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Total</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaInventario" style="background: white;">
            <tr><td colspan="8" style="text-align: center; padding: 20px;">Cargando...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="../BASE_DATOS/database.js"></script>
  <script src="../MENUS.JS"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      inicializarBD();
      renderizarUI();
    });

    function renderizarUI() {
      renderizarTabla();
    }

    function abrirModalArticulo() {
      const modal = `
        <div id="modal" class="modal" style="display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
          <div class="modal-contenido" style="background: white; margin: 50px auto; padding: 30px; width: 90%; max-width: 600px; border-radius: 8px;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
              <h2 style="margin: 0;">Nuevo Artículo</h2>
              <button class="btn-cerrar" onclick="cerrarModal()" style="background: #f5f5f5; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 20px;">✕</button>
            </div>
            <form onsubmit="guardarArticulo(event)">
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Descripción *</label>
                  <input type="text" id="descripcion" placeholder="Nombre artículo" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Referencia</label>
                  <input type="text" id="referencia" placeholder="Código/Ref" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Cantidad *</label>
                  <input type="number" id="cantidad" step="0.01" placeholder="0.00" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Stock Mínimo</label>
                  <input type="number" id="minStock" step="0.01" placeholder="0.00" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Precio Unitario *</label>
                  <input type="number" id="precioUnitario" step="0.01" placeholder="0.00" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Proveedor</label>
                  <input type="text" id="proveedor" placeholder="Proveedor" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; background: #2196F3; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">💾 Guardar Artículo</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modal);
    }

    function cerrarModal() {
      const modal = document.getElementById('modal');
      if (modal) modal.remove();
    }

    function guardarArticulo(event) {
      event.preventDefault();
      const descripcion = document.getElementById('descripcion').value.trim();
      const referencia = document.getElementById('referencia').value.trim();
      const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
      const minStock = parseFloat(document.getElementById('minStock').value) || 0;
      const precioUnitario = parseFloat(document.getElementById('precioUnitario').value) || 0;
      const proveedor = document.getElementById('proveedor').value.trim();

      if (!descripcion || cantidad <= 0 || precioUnitario <= 0) {
        alert('❌ Completa los campos requeridos');
        return;
      }

      const articulo = {
        id: Date.now().toString(),
        descripcion: descripcion,
        referencia: referencia,
        cantidad: cantidad,
        minStock: minStock,
        precioUnitario: precioUnitario,
        proveedor: proveedor,
        fechaRegistro: new Date().toISOString().split('T')[0]
      };

      const inventario = sistemaBD.inventario || [];
      inventario.push(articulo);
      guardarBD();

      cerrarModal();
      renderizarUI();
      alert('✓ Artículo registrado correctamente.');
    }

    function renderizarTabla() {
      const tbody = document.getElementById('tablaInventario');
      const articulos = sistemaBD.inventario || [];

      if (articulos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">No hay artículos registrados</td></tr>';
        actualizarResumen();
        return;
      }

      tbody.innerHTML = articulos.map(a => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${a.descripcion}</td>
          <td style="padding: 12px;">${a.referencia || '-'}</td>
          <td style="padding: 12px;">${a.cantidad}</td>
          <td style="padding: 12px;">${a.minStock || '-'}</td>
          <td style="padding: 12px;">
            <span style="background: ${a.cantidad <= a.minStock ? '#f44336' : '#4CAF50'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${a.cantidad <= a.minStock ? 'Bajo' : 'OK'}</span>
          </td>
          <td style="padding: 12px;">$${a.precioUnitario?.toFixed(2) || '0.00'}</td>
          <td style="padding: 12px;">$${(a.cantidad * a.precioUnitario).toFixed(2)}</td>
          <td style="padding: 12px;">
            <button class="btn-small btn-delete" onclick="eliminarArticulo('${a.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');

      actualizarResumen();
    }

    function filtrarTabla() {
      const termino = document.getElementById('buscarArticulo').value.toLowerCase();
      const articulos = sistemaBD.inventario || [];
      const filtrados = articulos.filter(a =>
        a.descripcion?.toLowerCase().includes(termino) ||
        a.referencia?.toLowerCase().includes(termino)
      );

      const tbody = document.getElementById('tablaInventario');
      if (filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">No hay resultados</td></tr>';
        return;
      }

      tbody.innerHTML = filtrados.map(a => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${a.descripcion}</td>
          <td style="padding: 12px;">${a.referencia || '-'}</td>
          <td style="padding: 12px;">${a.cantidad}</td>
          <td style="padding: 12px;">${a.minStock || '-'}</td>
          <td style="padding: 12px;">
            <span style="background: ${a.cantidad <= a.minStock ? '#f44336' : '#4CAF50'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${a.cantidad <= a.minStock ? 'Bajo' : 'OK'}</span>
          </td>
          <td style="padding: 12px;">$${a.precioUnitario?.toFixed(2) || '0.00'}</td>
          <td style="padding: 12px;">$${(a.cantidad * a.precioUnitario).toFixed(2)}</td>
          <td style="padding: 12px;">
            <button class="btn-small btn-delete" onclick="eliminarArticulo('${a.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    function eliminarArticulo(id) {
      if (!confirm('¿Seguro?')) return;
      const articulos = sistemaBD.inventario || [];
      const index = articulos.findIndex(a => a.id === id);
      if (index > -1) {
        articulos.splice(index, 1);
        guardarBD();
      }
      renderizarUI();
    }

    function actualizarResumen() {
      const articulos = sistemaBD.inventario || [];
      const total = articulos.length;
      const bajo = articulos.filter(a => a.cantidad <= a.minStock).length;
      const valor = articulos.reduce((sum, a) => sum + (a.cantidad * a.precioUnitario), 0);

      document.getElementById('totalArticulos').textContent = total;
      document.getElementById('stockBajo').textContent = bajo;
      document.getElementById('valorTotal').textContent = `$${valor.toFixed(2)}`;
    }
  </script>
</body>
</html>
