<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Búsqueda de Artículos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar.cerrado { width: 0; }
        .btn-menu { display: none; background: rgba(0,0,0,0.2); color: white; border: none; padding: 15px; cursor: pointer; }
        @media (max-width: 768px) { .btn-menu { display: block; } .sidebar { width: 100%; left: -100%; } .sidebar:not(.cerrado) { left: 0; } }
        .logo { display: flex; align-items: center; padding: 20px; gap: 10px; }
        .logo-icono { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .menu { padding: 10px; }
        .menu-item { display: flex; align-items: center; padding: 12px 15px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: 5px; gap: 10px; margin: 5px 0; }
        .menu-item:hover, .menu-item.activo { background: rgba(255,255,255,0.2); }
        .main-content { flex: 1; margin-left: 250px; padding: 0; overflow-y: auto; transition: all 0.3s; }
        .main-content.expandido { margin-left: 0; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } }
        .topbar { background: white; padding: 20px; }
        .topbar h1 { margin: 0; font-size: 28px; }
        .search-container { padding: 20px; background: white; margin: 20px; border-radius: 8px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .search-box button { padding: 12px 25px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .resultados { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .resultado { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .resultado h3 { margin-bottom: 10px; color: #333; }
        .resultado p { color: #666; font-size: 13px; margin: 5px 0; }
        .badge { display: inline-block; padding: 3px 8px; background: #667eea; color: white; border-radius: 12px; font-size: 11px; }
    </style>
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <button class="btn-menu" onclick="alternarMenu()">☰</button>
        <div class="logo"><div class="logo-icono">K</div><div class="logo-texto">KashlySys</div></div>
        <nav class="menu">
            <a href="../INICIO/index.html" class="menu-item"><span class="menu-icono">🏠</span><span class="menu-texto">Inicio</span></a>
            <a href="busqueda.html" class="menu-item activo"><span class="menu-icono">🔍</span><span class="menu-texto">Búsqueda</span></a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <section class="topbar">
            <h1>Búsqueda de Artículos y Referencias</h1>
            <p>Busca en piezas, goma, aceite e inventario</p>
        </section>

        <section class="search-container">
            <div class="search-box">
                <input type="text" id="buscador" placeholder="Buscar artículo, referencia o código..." onkeypress="buscarSiEnter(event)">
                <button onclick="buscar()">🔍 Buscar</button>
            </div>

            <div id="resultados" class="resultados"></div>
        </section>
    </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    inicializarBD();
});

function buscar() {
    const termino = document.getElementById('buscador').value.trim();
    if (!termino) {
        alert('Ingrese un término de búsqueda');
        return;
    }

    const resultados = buscarArticulo(termino);
    mostrarResultados(resultados);
}

function buscarSiEnter(e) {
    if (e.key === 'Enter') buscar();
}

function mostrarResultados(resultados) {
    const container = document.getElementById('resultados');
    let html = '';

    if (resultados.piezas.length) {
        html += '<h2>Piezas</h2>';
        html += resultados.piezas.map(p => `
            <div class="resultado">
                <h3>${p.descripcion}</h3>
                <p><strong>Referencia:</strong> ${p.referencia}</p>
                <p><span class="badge">Pieza</span></p>
            </div>
        `).join('');
    }

    if (resultados.goma.length) {
        html += '<h2>Goma/Llantas</h2>';
        html += resultados.goma.map(g => `
            <div class="resultado">
                <h3>${g.descripcion}</h3>
                <p><strong>Referencia:</strong> ${g.referencia}</p>
                <p><span class="badge">Goma</span></p>
            </div>
        `).join('');
    }

    if (resultados.aceite.length) {
        html += '<h2>Aceite</h2>';
        html += resultados.aceite.map(a => `
            <div class="resultado">
                <h3>${a.descripcion}</h3>
                <p><strong>Tipo:</strong> ${a.tipo}</p>
                <p><span class="badge">Aceite</span></p>
            </div>
        `).join('');
    }

    if (resultados.inventario.length) {
        html += '<h2>Inventario General</h2>';
        html += resultados.inventario.map(i => `
            <div class="resultado">
                <h3>${i.nombre}</h3>
                <p><strong>Referencia:</strong> ${i.referencia}</p>
                <p><strong>Cantidad:</strong> ${i.cantidad || 0}</p>
                <p><span class="badge">Inventario</span></p>
            </div>
        `).join('');
    }

    if (!html) {
        html = '<p style="color: #999; padding: 20px; text-align: center;">No se encontraron resultados</p>';
    }

    container.innerHTML = html;
}

function alternarMenu() {
    document.getElementById('sidebar').classList.toggle('cerrado');
    document.getElementById('mainContent').classList.toggle('expandido');
}
</script>
</body>
</html>
