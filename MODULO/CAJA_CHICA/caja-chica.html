<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Caja Chica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="../MENUS.CSS">
    <link rel="stylesheet" href="caja-chica.css">
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>
<div class="layout">

       <div id="menuGlobal"></div>
    

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <section class="topbar">
            <div><h1>Caja Chica</h1><p>Control de gastos menores y efectivo.</p></div>
            <div class="botones">
                <button class="btn btn-azul" onclick="abrirModalGasto()">➕ Nuevo Gasto</button>
                <button class="btn btn-verde" onclick="descargarExcel()">📥 Descargar</button>
                <button class="btn btn-rojo" onclick="limpiarDatos()">🗑 Limpiar</button>
            </div>
        </section>

        <section class="cards">
            <div class="card"><span>Total Gastos</span><strong id="cardTotal">$0.00</strong></div>
            <div class="card"><span>Este Mes</span><strong id="cardMes">$0.00</strong></div>
            <div class="card"><span>Promedio Diario</span><strong id="cardPromedio">$0.00</strong></div>
            <div class="card"><span>Últimos 7 días</span><strong id="cardSemana">$0.00</strong></div>
        </section>

        <section class="table-panel">
            <div class="panel-header">
                <div><h2>Registro de Gastos</h2></div>
                <input class="buscador" id="buscador" type="text" placeholder="Buscar..." oninput="filtrarDatos()">
            </div>

            <table class="tabla-datos">
                <thead>
                    <tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Monto</th><th>Empleado</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="modalGasto" class="modal">
    <div class="modal-contenido">
        <div class="modal-header"><h2>Nuevo Gasto</h2><button class="btn-cerrar" onclick="cerrarModal()">✕</button></div>
        <form onsubmit="guardarGasto(event)">
            <div class="form-grupo"><label>Fecha *</label><input type="date" id="fecha" required></div>
            <div class="form-grupo"><label>Descripción *</label><input type="text" id="descripcion" required></div>
            <div class="form-grupo"><label>Categoría *</label><select id="categoria" required>
                <option>Transporte</option><option>Alimentos</option><option>Útiles</option><option>Mantenimiento</option><option>Otro</option>
            </select></div>
            <div class="form-grupo"><label>Monto *</label><input type="number" id="monto" step="0.01" required></div>
            <div class="form-grupo"><label>Empleado</label><select id="empleado"></select></div>
            <div class="form-acciones"><button type="submit" class="btn btn-verde">💾 Guardar</button></div>
        </form>
    </div>
</div>

<script src="../MENUS.JS"></script>
<script src="caja-chica.js"></script>
</body>
</html>
