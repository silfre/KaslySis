<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .main-content { flex: 1; margin-left: 250px; overflow-y: auto; padding: 20px; }
        .topbar { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .topbar h1 { margin: 0; font-size: 28px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        .btn-azul { background: #2196F3; color: white; }
        .btn-azul:hover { background: #1976D2; }
        .etiquetas-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .etiqueta { border: 2px dashed #ddd; padding: 20px; text-align: center; background: white; border-radius: 8px; }
        .etiqueta h3 { margin: 10px 0; }
    </style>
    <script src="../BASE_DATOS/database.js"></script>
</head>

<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px;"><div style="font-size: 18px; font-weight: bold;">KashlySys</div></div>
        <nav style="padding: 10px;">
            <a href="../INICIO/index.html" style="display: flex; padding: 12px 15px; color: rgba(255,255,255,0.8); text-decoration: none;">🏠 Inicio</a>
            <a href="etiquetas.html" style="display: flex; padding: 12px 15px; background: rgba(255,255,255,0.2); color: white; text-decoration: none;">🏷️ Etiquetas</a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <section class="topbar">
            <h1>Impresor de Etiquetas</h1>
            <p>Genera y imprime etiquetas de artículos a gran escala</p>
            <button class="btn btn-azul" onclick="alert('✓ Función en desarrollo')">🖨️ Generar Etiquetas</button>
        </section>

        <section class="etiquetas-container">
            <div class="etiqueta">
                <h3>Artículo 1</h3>
                <p>Ref: 001</p>
                <p>$99.99</p>
            </div>
            <div class="etiqueta">
                <h3>Artículo 2</h3>

                <p>$149.99</p>
            </div>
            <div class="etiqueta">
                <h3>Artículo 3</h3>
                <p>Ref: 003</p>
                <p>$199.99</p>
            </div>
        </section>
    </main>
</div>

</body>
</html>
