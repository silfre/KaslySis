<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../MENUS.CSS">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button type="button" class="btn-menu" onclick="alternarMenu()" title="Abrir/Cerrar menú">☰</button>
      <div class="brand">
        <div class="brand-icon">K</div>
        <div class="brand-text">KashlySys</div>
      </div>
      <nav class="menu">
        <a href="../INICIO/index.html" class="menu-item">
          <span class="menu-emoji">🏠</span>
          <span class="menu-text">Inicio</span>
        </a>
        <a href="etiquetas-nuevo.html" class="menu-item active">
          <span class="menu-emoji">🏷️</span>
          <span class="menu-text">Etiquetas</span>
        </a>
      </nav>
    </aside>

    <main class="main-content" id="mainContent">
      <section class="topbar card">
        <div>
          <h1>🏷️ Generador de Etiquetas</h1>
          <p>Crear y personalizar etiquetas para artículos</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-primary" onclick="abrirModalEtiqueta()" style="background: #2196F3; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">➕ Nueva Etiqueta</button>
          <button class="btn btn-primary" onclick="imprimirEtiquetas()" style="background: #FF9800; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">🖨️ Imprimir</button>
        </div>
      </section>

      <section class="summary-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; background: white; margin: 20px; border-radius: 8px;">
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Total Etiquetas</span>
          <strong id="totalEtiquetas" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
        <div class="summary-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px;">
          <span>Pendientes de Imprimir</span>
          <strong id="pendientes" style="display: block; font-size: 28px; margin-top: 10px;">0</strong>
        </div>
      </section>

      <section class="card" style="background: white; padding: 20px; margin: 20px; border-radius: 8px;">
        <div class="section-header" style="margin-bottom: 15px;">
          <input type="text" id="buscarEtiqueta" placeholder="Buscar..." onkeyup="filtrarTabla()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        <table class="tabla-datos" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #f5f5f5;">
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Artículo</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Referencia</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Cantidad</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Estado</th>
              <th style="padding: 12px; text-align: left; border-bottom: 2px solid #ddd;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaEtiquetas">
            <tr><td colspan="5" style="text-align: center; padding: 20px;">No hay etiquetas</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="../BASE_DATOS/database.js"></script>
  <script src="../MENUS.JS"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      inicializarBD();
      renderizarUI();
    });

    function renderizarUI() {
      renderizarTabla();
    }

    function abrirModalEtiqueta() {
      const modal = `
        <div id="modal" class="modal" style="display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
          <div class="modal-contenido" style="background: white; margin: 50px auto; padding: 30px; width: 90%; max-width: 600px; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
              <h2 style="margin: 0;">Nueva Etiqueta</h2>
              <button onclick="cerrarModal()" style="background: #f5f5f5; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 20px;">✕</button>
            </div>
            <form onsubmit="guardarEtiqueta(event)">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Artículo *</label>
                  <input type="text" id="articulo" placeholder="Nombre" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Referencia</label>
                  <input type="text" id="referencia" placeholder="Código" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Cantidad *</label>
                  <input type="number" id="cantidad" placeholder="0" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div><label style="display: block; margin-bottom: 5px; font-weight: bold;">Formato</label>
                  <select id="formato" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="pequeña">Pequeña</option>
                    <option value="mediana" selected>Mediana</option>
                    <option value="grande">Grande</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; background: #2196F3; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">💾 Crear Etiqueta</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modal);
    }

    function cerrarModal() {
      const modal = document.getElementById('modal');
      if (modal) modal.remove();
    }

    function guardarEtiqueta(event) {
      event.preventDefault();
      const articulo = document.getElementById('articulo').value.trim();
      const referencia = document.getElementById('referencia').value.trim();
      const cantidad = parseInt(document.getElementById('cantidad').value) || 0;
      const formato = document.getElementById('formato').value.trim();

      if (!articulo || cantidad <= 0) {
        alert('❌ Completa los campos requeridos');
        return;
      }

      const etiqueta = {
        id: Date.now().toString(),
        articulo: articulo,
        referencia: referencia,
        cantidad: cantidad,
        formato: formato,
        estado: 'Pendiente',
        fechaCreacion: new Date().toISOString().split('T')[0]
      };

      const etiquetas = sistemaBD.etiquetas || [];
      etiquetas.push(etiqueta);
      guardarBD();

      cerrarModal();
      renderizarUI();
      alert('✓ Etiqueta creada correctamente.');
    }

    function renderizarTabla() {
      const tbody = document.getElementById('tablaEtiquetas');
      const etiquetas = sistemaBD.etiquetas || [];

      if (etiquetas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No hay etiquetas registradas</td></tr>';
        actualizarResumen();
        return;
      }

      tbody.innerHTML = etiquetas.map(e => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${e.articulo}</td>
          <td style="padding: 12px;">${e.referencia || '-'}</td>
          <td style="padding: 12px;">${e.cantidad}</td>
          <td style="padding: 12px;">
            <span style="background: ${e.estado === 'Impreso' ? '#4CAF50' : '#FFC107'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${e.estado}</span>
          </td>
          <td style="padding: 12px;">
            <button onclick="marcarImpreso('${e.id}')" style="background: #4CAF50; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-right: 5px;">✓ Impreso</button>
            <button onclick="eliminarEtiqueta('${e.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');

      actualizarResumen();
    }

    function filtrarTabla() {
      const termino = document.getElementById('buscarEtiqueta').value.toLowerCase();
      const etiquetas = sistemaBD.etiquetas || [];
      const filtradas = etiquetas.filter(e => e.articulo?.toLowerCase().includes(termino));

      const tbody = document.getElementById('tablaEtiquetas');
      if (filtradas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No hay resultados</td></tr>';
        return;
      }

      tbody.innerHTML = filtradas.map(e => `
        <tr style="border-bottom: 1px solid #ddd;">
          <td style="padding: 12px;">${e.articulo}</td>
          <td style="padding: 12px;">${e.referencia || '-'}</td>
          <td style="padding: 12px;">${e.cantidad}</td>
          <td style="padding: 12px;">
            <span style="background: ${e.estado === 'Impreso' ? '#4CAF50' : '#FFC107'}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px;">${e.estado}</span>
          </td>
          <td style="padding: 12px;">
            <button onclick="marcarImpreso('${e.id}')" style="background: #4CAF50; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-right: 5px;">✓</button>
            <button onclick="eliminarEtiqueta('${e.id}')" style="background: #f44336; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">🗑</button>
          </td>
        </tr>
      `).join('');
    }

    function marcarImpreso(id) {
      const etiquetas = sistemaBD.etiquetas || [];
      const etiqueta = etiquetas.find(e => e.id === id);
      if (etiqueta) {
        etiqueta.estado = 'Impreso';
        guardarBD();
        renderizarUI();
      }
    }

    function eliminarEtiqueta(id) {
      if (!confirm('¿Seguro?')) return;
      const etiquetas = sistemaBD.etiquetas || [];
      const index = etiquetas.findIndex(e => e.id === id);
      if (index > -1) {
        etiquetas.splice(index, 1);
        guardarBD();
      }
      renderizarUI();
    }

    function imprimirEtiquetas() {
      alert('✓ Enviado a la impresora (función en desarrollo)');
    }

    function actualizarResumen() {
      const etiquetas = sistemaBD.etiquetas || [];
      const total = etiquetas.length;
      const pendientes = etiquetas.filter(e => e.estado === 'Pendiente').length;

      document.getElementById('totalEtiquetas').textContent = total;
      document.getElementById('pendientes').textContent = pendientes;
    }
  </script>
</body>
</html>
